<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Inventory Manager</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="bg-light">
        <div class="container mt-5">
            <h2 class="text-center mb-4 text-primary" id="smart"><b>SMART INVENTORY MANAGEMENT</b></h2>
            <div class="card border-0 shadow-sm mb-5">
                <div class="card-body">
                    <h5 class="card-title mb-3">Add Inventory Item</h5>
                    <form id="productForm" class="row g-3">
                        <div class="col-md-3">
                            <input type="text" id="name" class="form-control"
                                placeholder="Product Name" required>
                        </div>
                        <div class="col-md-3">
                            <input type="text" id="category"
                                class="form-control"
                                placeholder="Category"
                                required>
                        </div>
                        <div class="col-md-2">
                            <input type="number" id="price" class="form-control"
                                placeholder="Price" step="0.01" required>
                        </div>
                        <div class="col-md-2">
                            <input type="number" id="stock" class="form-control"
                                placeholder="Quantity" required>
                        </div>
                        <div class="col-md-2">
                            <button type="submit"
                                class="btn btn-success w-100">ADD</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="table-container">
                <h5 class="mb-3">Present Inventory List</h5>
                <table class="table table-hover align-middle">
                    <thead class="table-primary">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody">
                    </tbody>
                </table>
            </div>
        </div>
    </body>
    <script src="main.js"></script>
</html>
